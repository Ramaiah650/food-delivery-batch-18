<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Food Hub</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-shell">
        <aside class="login-visual" aria-hidden="true">
            <img class="login-visual-bg" src="https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg?auto=compress&cs=tinysrgb&w=1400" alt="">
            <div class="login-visual-overlay"></div>
            <div class="login-visual-content">
                <img class="login-visual-logo" src="https://cdn.pixabay.com/photo/2016/11/19/15/40/fast-food-1849271_640.jpg" alt="">
                <h2>FoodHub</h2>
                <p>Fresh meals from local restaurants, delivered to your door.</p>
            </div>
        </aside>

        <div class="login-main">
            <a class="back-home" href="index.html">← Back to home</a>
            <div class="login-container">
                <div class="login-header">
                    <h1>Welcome back</h1>
                    <p>Sign in to order and track your food</p>
                </div>

                <div class="login-body">
                    <form id="loginForm">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="loginEmail" placeholder="your@email.com" required>
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        </div>

                        <div class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <label>Remember me</label>
                        </div>

                        <button type="submit" class="login-btn">Sign In</button>

                        <div class="signup-link">
                            Don't have an account?
                            <a href="#" onclick="toggleForm(); return false;">Sign Up</a>
                        </div>
                    </form>

                    <form id="signupForm" style="display: none;">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="signupName" required>
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="signupEmail" required>
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="signupPassword" required>
                        </div>

                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="signupPhone" required>
                        </div>

                        <div class="form-group">
                            <label>Address</label>
                            <textarea id="signupAddress" required rows="3"></textarea>
                        </div>

                        <button type="submit" class="login-btn">Create Account</button>

                        <div class="signup-link">
                            Already have an account?
                            <a href="#" onclick="toggleForm(); return false;">Sign In</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
